<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Klinik Yakin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col">

    <header class="bg-blue-700 text-white p-4 shadow-lg flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <a href="../index.html" class="hover:bg-blue-800 p-2 rounded-lg transition-all"><i class="fas fa-home"></i></a>
            <h1 class="text-xl font-bold italic tracking-wider">KLINIK YAKIN</h1>
        </div>
        <div class="text-sm bg-blue-800 px-3 py-1 rounded-full border border-blue-400">Staff: Kaunter 1</div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <div class="flex-1 p-4 overflow-y-auto">
            <div class="mb-4">
                <input type="text" placeholder="Cari ubat atau rawatan..." class="w-full p-4 rounded-2xl border-none shadow-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4" id="product-list">
                <button class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-blue-500 active:scale-95 transition-all text-left group hover:bg-blue-50">
                    <h3 class="font-bold text-gray-700 group-hover:text-blue-700">Panadol 500mg</h3>
                    <p class="text-blue-600 font-black text-lg">RM 5.00</p>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mt-2">Stok: 45</p>
                </button>
                <button class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-green-500 active:scale-95 transition-all text-left group hover:bg-green-50">
                    <h3 class="font-bold text-gray-700 group-hover:text-green-700">Cough Syrup</h3>
                    <p class="text-blue-600 font-black text-lg">RM 12.00</p>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mt-2">Stok: 12</p>
                </button>
                <button class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-purple-500 active:scale-95 transition-all text-left group hover:bg-purple-50">
                    <h3 class="font-bold text-gray-700 group-hover:text-purple-700">Consultation</h3>
                    <p class="text-blue-600 font-black text-lg">RM 30.00</p>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mt-2">Service</p>
                </button>
            </div>
        </div>

        <div class="w-full md:w-96 bg-white shadow-2xl flex flex-col border-t md:border-t-0 md:border-l border-gray-200">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="font-bold text-lg"><i class="fas fa-shopping-cart mr-2 text-blue-600"></i>Invois Jualan</h2>
                <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-1 rounded-md font-bold uppercase">Online Sync</span>
            </div>
            
            <div id="cart-items" class="flex-1 p-6 overflow-y-auto space-y-4">
                <p class="text-center text-gray-400 text-sm mt-10 italic">Bakul masih kosong. Klik ubat untuk tambah.</p>
            </div>

            <div class="p-6 bg-slate-50 space-y-4 border-t shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                <div class="flex justify-between text-xl font-black text-blue-700">
                    <span>TOTAL</span>
                    <span id="grand-total">RM 0.00</span>
                </div>
                <button id="btn-pay" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-widest">
                    Proses Bayaran
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { addToCart, processPayment } from "../public/js/logic.js";
        
        // Klik Produk
        document.querySelectorAll('#product-list button').forEach(button => {
            button.addEventListener('click', () => {
                const name = button.querySelector('h3').innerText;
                const price = parseFloat(button.querySelector('.text-blue-600').innerText.replace('RM ', ''));
                addToCart(name, price);
            });
        });

        // Klik Bayar
        document.getElementById('btn-pay').addEventListener('click', () => {
            processPayment();
        });
    </script>
</body>
</html>
